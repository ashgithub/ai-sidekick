<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Tools Codex Sidekick</title>
  <link rel="stylesheet" href="/static/assets/fonts/fonts.css?v=answer">
  <link rel="stylesheet" href="/static/styles.css?v=answer">
</head>
<body>
  <main class="sidekick-shell" aria-label="Codex sidekick">
    <section class="sidekick-panel">
      <header class="sidekick-header">
        <div>
          <p id="source-line" class="eyebrow">Waiting for a shortcut</p>
          <h1>Codex sidekick</h1>
        </div>
        <span id="active-status" class="status-pill status-idle">Idle</span>
      </header>

      <section id="run-summary" class="summary-card" aria-live="polite">
        Waiting for a shortcut or task.
      </section>

      <section class="response-card" aria-label="Current response">
        <div class="section-header">
          <h2>Answer</h2>
          <button id="refresh-btn" type="button" class="ghost-button">Refresh</button>
        </div>
        <button id="new-output-btn" type="button" class="new-output-button" hidden>New output</button>
        <div id="response-view" class="response-text">No response yet.</div>
      </section>

      <section class="progress-card" aria-label="Progress">
        <h2>Progress</h2>
        <ol id="phase-list" class="phase-list">
          <li>No active invocation yet.</li>
        </ol>
      </section>

      <section id="approval-box" class="approval-card">No approval needed.</section>

      <section class="composer-card" aria-label="Sidekick composer">
        <label id="composer-label" for="composer-input" data-steer-label="Steer this run">Start new task</label>
        <textarea id="composer-input" rows="3" placeholder="Type a follow-up, steering note, or new task."></textarea>
        <div class="composer-actions">
          <button id="submit-composer-btn" type="button">Submit</button>
          <button id="new-task-btn" type="button" class="ghost-button">New task</button>
        </div>
      </section>

      <div class="debug-stack">
        <details class="debug-drawer">
          <summary>Prompt</summary>
          <pre id="prompt-view" class="debug-text">No prompt yet.</pre>
        </details>

        <details class="debug-drawer">
          <summary>Raw stream</summary>
          <pre id="raw-stream-view" class="debug-text">No raw stream yet.</pre>
        </details>

        <details class="debug-drawer">
          <summary>Tool calls</summary>
          <pre id="tool-log" class="debug-text">No tool calls yet.</pre>
        </details>

        <details class="debug-drawer">
          <summary>Trace</summary>
          <pre id="event-log" class="debug-text">No trace yet.</pre>
        </details>
      </div>
    </section>
  </main>
  <script src="/static/app.js?v=answer"></script>
</body>
</html>

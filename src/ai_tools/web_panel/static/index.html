<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Tools Codex Sidekick</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="sidekick-shell" aria-label="Codex companion">
    <section class="sidekick-card">
      <header class="sidekick-header">
        <div>
          <p class="eyebrow">AI Tools</p>
          <h1>Codex sidekick</h1>
        </div>
        <span id="active-status" class="status-pill status-idle">Idle</span>
      </header>

      <section id="run-summary" class="summary-card" aria-live="polite">
        Waiting for a shortcut or manual prompt.
      </section>

      <section class="section-card">
        <div class="section-header">
          <h2>Progress</h2>
          <button id="refresh-btn" type="button" class="ghost-button">Refresh</button>
        </div>
        <ol id="phase-list" class="phase-list">
          <li>No active invocation yet.</li>
        </ol>
      </section>

      <section class="section-card response-card">
        <div class="section-header">
          <h2>Response</h2>
        </div>
        <div id="response-view" class="response-text">No response yet.</div>
      </section>

      <section id="approval-box" class="approval-box">No approval needed.</section>

      <details class="debug-panel">
        <summary>Prompt</summary>
        <pre id="prompt-view" class="debug-text">No prompt yet.</pre>
      </details>

      <details class="debug-panel">
        <summary>Trace</summary>
        <pre id="event-log" class="debug-text">No trace yet.</pre>
      </details>

      <details class="debug-panel">
        <summary>Manual prompt</summary>
        <textarea id="manual-prompt" rows="4" placeholder="Submit a local prompt through the resident bridge."></textarea>
        <button id="submit-manual-btn" type="button">Submit prompt</button>
      </details>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>

# Local bridge HTTP settings.
# Docs: docs/slack-codex-workflow.md#bridge-readiness
server:
  host: 127.0.0.1
  port: 8765

# Controls when the companion panel opens.
# Use "always" while debugging; switch to "attention" once stable.
panel:
  visibility: always # always | attention | manual
  # Opens/focuses the native sidekick. Used by auto-open paths.
  open_command: scripts/internal/panel-show.sh
  # Toggles the native sidekick. Used by the function-key shortcut.
  toggle_command: scripts/internal/panel-toggle.sh
  open_hotkey:
    # Function-key shortcut to toggle the companion on demand.
    # Plain F5 is easy to reach and unused by this repo's Hammerspoon bindings.
    # If browser refresh conflicts with your muscle memory, change to f6.
    mods: []
    key: f5

# Native macOS notifications are optional; Hammerspoon alerts and the sidekick
# still show local progress when this is false.
notifications:
  enabled: false

# Settings passed to Codex app-server thread creation.
# Use "inherit" to use ~/.codex/config.toml instead of forcing a POC-specific model.
# AI Text Tools can reuse in-memory per-tool threads while the daemon is alive.
# Restarting the daemon clears those reusable thread ids; no run history is kept.
codex:
  model: inherit
  approval_policy: on-request
  approvals_reviewer: auto_review
  personality: pragmatic
  # Codex threads for the sidekick start outside this repo by default.
  # This keeps proofread/explain/tool-helper threads from appearing under
  # the current project unless you intentionally point them there.
  # On daemon startup, the bridge exposes this repo's editable skills at
  # <cwd>/skills, so prompts can use paths like skills/proofread-slack/SKILL.md
  # without searching /Users/ashish/work. By default this is a symlink to the
  # repo's skills directory; replace it with a real directory if you want a
  # private scratch copy that the bridge will not overwrite.
  cwd: ~/tmp/codex_ai_tools
  # Reusable AI Tools threads are reset after either limit to avoid stale
  # accumulated context while keeping warm proofread/explain runs fast.
  reusable_thread_max_turns: 20
  reusable_thread_max_age_minutes: 60

# Slack is the first source adapter; prompt body stays in Markdown for review.
slack:
  enabled: true
  prompt_file: slack_codex_workflow/prompts/codex_worker.md
  status_mode: source_message # source_message | final_only
  # Latest @codex is used without a hard Slack `after` filter. If it is older
  # than this threshold, Codex stops and asks for a fresh request/confirmation.
  latest_message_max_age_minutes: 30

# Hammerspoon posts only app/text/interaction to /api/shortcut. The bridge
# resolves app-specific product policy here so new apps usually do not require
# Lua changes. Profiles point at plain Markdown prompt files under prompts/.
shortcuts:
  pending_retry_after_ms: 200
  review_retry_after_ms: 500
  profiles:
    - name: slack
      app_patterns: ["slack"]
      prompt_file: prompts/slack.md
      app_context: Slack
      nudge: slack
      render_kind: text_pair
      intent: reuse
      client_action: wait_for_sidekick
      show_panel: true
      panel_mode: rewrite
    - name: email
      app_patterns: ["mail", "outlook"]
      prompt_file: prompts/email.md
      app_context: Email
      nudge: email
      render_kind: text_pair
      intent: reuse
      client_action: wait_for_sidekick
      show_panel: true
      panel_mode: rewrite
    - name: ask
      app_patterns: ["safari", "chrome", "terminal", "iterm2", "ghostty", "codex", "visual studio code", "code"]
      prompt_file: prompts/ask.md
      nudge: explain
      render_kind: single_text
      intent: reuse
      client_action: show_sidekick
      show_panel: true
      panel_mode: ask
    - name: default
      app_patterns: ["*"]
      prompt_file: prompts/general.md
      render_kind: text_pair
      intent: reuse
      client_action: wait_for_sidekick
      show_panel: true
      panel_mode: rewrite
